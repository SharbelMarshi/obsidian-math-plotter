name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release metadata
        run: node scripts/verify-release.mjs

      - name: Validate tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Release tag '$tag' must exactly match manifest.json version '$version' (no v prefix)."
            exit 1
          fi

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Package full plugin folder (manual install)
        run: node scripts/package-release.mjs

      - name: Verify release artifacts exist
        run: |
          for f in main.js manifest.json styles.css; do
            if [ ! -f "$f" ]; then
              echo "Missing required artifact: $f"
              exit 1
            fi
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
          show-summary: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets=(main.js manifest.json styles.css math-plotter-full.zip)
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            "${assets[@]}"
