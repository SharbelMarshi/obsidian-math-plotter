name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release metadata
        run: node scripts/verify-release.mjs

      - name: Validate tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$version" ]; then
            echo "Release tag '$tag' must exactly match manifest.json version '$version' (no v prefix)."
            exit 1
          fi

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Package full plugin folder (manual install)
        run: node scripts/package-release.mjs

      - name: Check for optional styles
        id: styles
        run: |
          if [ -f styles.css ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest@v2
        with:
          subject-path: |
            main.js
            manifest.json
            ${{ steps.styles.outputs.exists == 'true' && 'styles.css' || '' }}

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets=(main.js manifest.json math-plotter-full.zip)
          if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
            assets+=(styles.css)
          fi
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            "${assets[@]}"
